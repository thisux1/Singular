services:
  db:
    image: postgres:16-alpine
    container_name: singular-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: singular-redis
    restart: always
    ports:
      - '6379:6379'

  # Local OCR via Ollama (optional, for personal/dev use)
  # Start with: docker compose --profile local-ocr up
  ollama:
    image: ollama/ollama
    container_name: singular-ollama
    profiles:
      - local-ocr
    restart: unless-stopped
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  postgres_data:
  ollama_data:

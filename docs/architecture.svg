<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 240" width="100%" height="100%">
  <defs>
    <!-- Glowing filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-yellow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .bg { fill: #070303; }
    .title { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: rgba(255, 255, 255, 0.4); letter-spacing: 2px; }
    .node-text { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: bold; }
    .node-subtext { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: rgba(255, 255, 255, 0.5); }
    .conn-line { fill: none; stroke-width: 1.5; stroke-dasharray: 4 4; }
    .flow-arrow { fill: none; stroke-width: 1.5; }
    
    /* Animation for active flow lines */
    @keyframes dash {
      to {
        stroke-dashoffset: -20;
      }
    }
    .flow-active {
      animation: dash 1s linear infinite;
    }
  </style>

  <!-- Background -->
  <rect class="bg" width="100%" height="100%"/>
  <rect x="1" y="1" width="1078" height="238" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>

  <!-- GRID DECORATION -->
  <line x1="0" y1="40" x2="1080" y2="40" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1"/>
  <text x="20" y="25" class="title">ARQUITETURA DE DADOS E FLUXO DA SINGULARIDADE</text>
  
  <!-- ==================== NODE 1: INPUT ==================== -->
  <g transform="translate(40, 70)">
    <!-- Box border -->
    <polygon points="10,0 150,0 160,10 160,80 150,90 10,90 0,80 0,10" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1.5"/>
    <text x="20" y="30" class="node-text" fill="#ffffff">01. DOCUMENTO</text>
    <text x="20" y="50" class="node-subtext">PDF escaneado</text>
    <text x="20" y="65" class="node-subtext">Imagem de exame</text>
    <rect x="15" y="75" width="45" height="1" fill="#ea580c" filter="url(#glow-orange)"/>
  </g>

  <!-- Flow 1 -> 2 -->
  <path class="conn-line flow-active" d="M 200,115 L 250,115" stroke="#ea580c" />
  <path class="flow-arrow" d="M 245,110 L 250,115 L 245,120" stroke="#ea580c" />

  <!-- ==================== NODE 2: PYTHON OCR ==================== -->
  <g transform="translate(250, 70)">
    <polygon points="10,0 150,0 160,10 160,80 150,90 10,90 0,80 0,10" fill="rgba(234, 88, 12, 0.02)" stroke="#ea580c" stroke-width="1.5" filter="url(#glow-orange)"/>
    <text x="20" y="30" class="node-text" fill="#ffffff">02. PIPELINE OCR</text>
    <text x="20" y="50" class="node-subtext">Engine em Python</text>
    <text x="20" y="65" class="node-subtext">Ollama / Gemini API</text>
    <text x="20" y="80" class="node-subtext" fill="#ea580c" font-size="8">[ JSON PYDANTIC ]</text>
  </g>

  <!-- Flow 2 -> 3 -->
  <path class="conn-line flow-active" d="M 410,115 L 460,115" stroke="#facc15" />
  <path class="flow-arrow" d="M 455,110 L 460,115 L 455,120" stroke="#facc15" />

  <!-- ==================== NODE 3: BACKEND API ==================== -->
  <g transform="translate(460, 70)">
    <polygon points="10,0 150,0 160,10 160,80 150,90 10,90 0,80 0,10" fill="rgba(250, 204, 21, 0.02)" stroke="#facc15" stroke-width="1.5" filter="url(#glow-yellow)"/>
    <text x="20" y="30" class="node-text" fill="#ffffff">03. HONO BACKEND</text>
    <text x="20" y="50" class="node-subtext">Node.js API + Redis</text>
    <text x="20" y="65" class="node-subtext">BullMQ Workers</text>
    <text x="20" y="80" class="node-subtext" fill="#facc15" font-size="8">[ FILAS ASSÍNCRONAS ]</text>
  </g>

  <!-- Flow 3 -> 4 -->
  <path class="conn-line flow-active" d="M 620,115 L 670,115" stroke="#38bdf8" />
  <path class="flow-arrow" d="M 665,110 L 670,115 L 665,120" stroke="#38bdf8" />

  <!-- ==================== NODE 4: PERSISTENCE ==================== -->
  <g transform="translate(670, 70)">
    <polygon points="10,0 150,0 160,10 160,80 150,90 10,90 0,80 0,10" fill="rgba(56, 189, 248, 0.02)" stroke="#38bdf8" stroke-width="1.5" filter="url(#glow-cyan)"/>
    <text x="20" y="30" class="node-text" fill="#ffffff">04. PERSISTÊNCIA</text>
    <text x="20" y="50" class="node-subtext">PostgreSQL DB</text>
    <text x="20" y="65" class="node-subtext">Drizzle ORM</text>
    <text x="20" y="80" class="node-subtext" fill="#38bdf8" font-size="8">[ TRANSAÇÕES / HISTÓRICO ]</text>
  </g>

  <!-- Flow 4 -> 5 -->
  <path class="conn-line flow-active" d="M 830,115 L 880,115" stroke="#ffffff" />
  <path class="flow-arrow" d="M 875,110 L 880,115 L 875,120" stroke="#ffffff" />

  <!-- ==================== NODE 5: FRONTEND ==================== -->
  <g transform="translate(880, 70)">
    <polygon points="10,0 150,0 160,10 160,80 150,90 10,90 0,80 0,10" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.6)" stroke-width="1.5"/>
    <text x="20" y="30" class="node-text" fill="#ffffff">05. REACTION UI</text>
    <text x="20" y="50" class="node-subtext">Vite + React App</text>
    <text x="20" y="65" class="node-subtext">Vanilla CSS puro</text>
    <text x="20" y="80" class="node-subtext" fill="#ffffff" font-size="8">[ 60FPS EFFECTS ]</text>
  </g>

  <!-- Decal coordinates at the bottom -->
  <text x="20" y="210" class="node-subtext" fill="rgba(255, 255, 255, 0.2)">SEC_COORD_A: [0xFD89] // SYSTEM: STEADY</text>
  <text x="1060" y="210" class="node-subtext" fill="rgba(255, 255, 255, 0.2)" text-anchor="end">OCR_THRESHOLD: 98.6%</text>
</svg>
